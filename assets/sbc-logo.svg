<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#12052a"/>
      <stop offset="60%" stop-color="#080118"/>
      <stop offset="100%" stop-color="#04000e"/>
    </radialGradient>
    <radialGradient id="rim" cx="33%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#ffe8a0"/>
      <stop offset="28%" stop-color="#d4a017"/>
      <stop offset="65%" stop-color="#8a6000"/>
      <stop offset="100%" stop-color="#3a2000"/>
    </radialGradient>
    <radialGradient id="face" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#1e0840"/>
      <stop offset="50%" stop-color="#100428"/>
      <stop offset="100%" stop-color="#06011a"/>
    </radialGradient>
    <radialGradient id="sphere" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#c8920a"/>
      <stop offset="35%" stop-color="#8a6000"/>
      <stop offset="70%" stop-color="#5a3c00"/>
      <stop offset="100%" stop-color="#2e1e00"/>
    </radialGradient>
    <radialGradient id="sphereGlow" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coinGlow" cx="38%" cy="34%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sbcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe880"/>
      <stop offset="100%" stop-color="#c8920a"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#d4a017" flood-opacity="0.38"/>
      <feDropShadow dx="0" dy="0" stdDeviation="40" flood-color="#2adb6f" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="sphereSh">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#d4a017" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#ffa020" flood-opacity="0.35"/>
    </filter>
    <filter id="halo">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="innerClip">
      <circle cx="250" cy="244" r="170"/>
    </clipPath>
  </defs>

  <!-- Fond -->
  <rect width="500" height="500" fill="url(#bg)" rx="32"/>
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="11" cy="11" r="0.6" fill="#fff" opacity="0.07"/>
  </pattern>
  <rect width="500" height="500" fill="url(#dots)" rx="32"/>

  <!-- Halos ambiants -->
  <ellipse cx="250" cy="260" rx="200" ry="185" fill="#d4a017" opacity="0.07" filter="url(#halo)"/>
  <ellipse cx="250" cy="260" rx="130" ry="115" fill="#2adb6f" opacity="0.10" filter="url(#halo)"/>

  <!-- Bord pièce -->
  <circle cx="250" cy="244" r="196" fill="url(#rim)" filter="url(#sh)"/>
  <circle cx="250" cy="244" r="193" fill="none" stroke="#ffe066" stroke-width="1.6" stroke-dasharray="5.5 3.2" opacity="0.28"/>
  <circle cx="250" cy="244" r="189" fill="none" stroke="#6a4000" stroke-width="0.8" stroke-dasharray="4.5 3.5" opacity="0.20"/>

  <!-- Face pièce -->
  <circle cx="250" cy="244" r="182" fill="url(#face)"/>

  <!-- Anneaux orbitaux -->
  <g clip-path="url(#innerClip)">
    <!-- Ellipses inclinées -->
    <g transform="translate(250,244)" opacity="0.55">
      <ellipse rx="168" ry="80" fill="none" stroke="#d4a017" stroke-width="0.7" transform="rotate(-12)"/>
      <ellipse rx="158" ry="74" fill="none" stroke="#c8920a" stroke-width="0.6" transform="rotate(-12)"/>
      <ellipse rx="148" ry="68" fill="none" stroke="#d4a017" stroke-width="0.6" transform="rotate(-12)"/>
      <ellipse rx="138" ry="63" fill="none" stroke="#c8920a" stroke-width="0.5" transform="rotate(-12)"/>
      <ellipse rx="128" ry="58" fill="none" stroke="#d4a017" stroke-width="0.5" transform="rotate(-12)"/>
      <ellipse rx="118" ry="53" fill="none" stroke="#b87800" stroke-width="0.5" transform="rotate(-12)"/>
      <ellipse rx="108" ry="48" fill="none" stroke="#d4a017" stroke-width="0.5" transform="rotate(-12)"/>
      <ellipse rx="98"  ry="43" fill="none" stroke="#c8920a" stroke-width="0.4" transform="rotate(-12)"/>
      <ellipse rx="88"  ry="38" fill="none" stroke="#d4a017" stroke-width="0.4" transform="rotate(-12)"/>
      <ellipse rx="78"  ry="34" fill="none" stroke="#b87800" stroke-width="0.4" transform="rotate(-12)"/>
      <ellipse rx="68"  ry="29" fill="none" stroke="#c8920a" stroke-width="0.4" transform="rotate(-12)"/>
      <ellipse rx="58"  ry="25" fill="none" stroke="#d4a017" stroke-width="0.35" transform="rotate(-12)"/>
    </g>
    <!-- Cercles concentriques -->
    <g transform="translate(250,244)" opacity="0.45">
      <circle r="162" fill="none" stroke="#d4a017" stroke-width="0.8"/>
      <circle r="150" fill="none" stroke="#c8920a" stroke-width="0.6"/>
      <circle r="138" fill="none" stroke="#d4a017" stroke-width="0.6"/>
      <circle r="126" fill="none" stroke="#b87800" stroke-width="0.5"/>
      <circle r="114" fill="none" stroke="#d4a017" stroke-width="0.5"/>
      <circle r="102" fill="none" stroke="#c8920a" stroke-width="0.5"/>
      <circle r="90"  fill="none" stroke="#d4a017" stroke-width="0.45"/>
      <circle r="78"  fill="none" stroke="#b87800" stroke-width="0.4"/>
      <circle r="66"  fill="none" stroke="#c8920a" stroke-width="0.4"/>
      <circle r="54"  fill="none" stroke="#d4a017" stroke-width="0.4"/>
    </g>
    <!-- Anneaux proéminents -->
    <g transform="translate(250,244)">
      <circle r="158" fill="none" stroke="#d4a017" stroke-width="1.8" opacity="0.70"/>
      <circle r="156" fill="none" stroke="#ffe066" stroke-width="0.7" opacity="0.35"/>
      <circle r="100" fill="none" stroke="#d4a017" stroke-width="1.4" opacity="0.55"/>
      <circle r="98"  fill="none" stroke="#ffe066" stroke-width="0.5" opacity="0.25"/>
    </g>
    <!-- Points cardinaux -->
    <g fill="#d4a017">
      <circle cx="250" cy="86"  r="3.5" opacity="0.85"/>
      <circle cx="250" cy="402" r="3.5" opacity="0.85"/>
      <circle cx="92"  cy="244" r="3.5" opacity="0.85"/>
      <circle cx="408" cy="244" r="3.5" opacity="0.85"/>
      <circle cx="138" cy="130" r="2.5" opacity="0.60"/>
      <circle cx="362" cy="130" r="2.5" opacity="0.60"/>
      <circle cx="138" cy="358" r="2.5" opacity="0.60"/>
      <circle cx="362" cy="358" r="2.5" opacity="0.60"/>
    </g>
    <!-- Lignes radiales -->
    <g transform="translate(250,244)" stroke="#d4a017" stroke-width="0.5" opacity="0.18">
      <line x1="0" y1="-165" x2="0" y2="-38"/>
      <line x1="0" y1="165"  x2="0" y2="38"/>
      <line x1="-165" y1="0" x2="-38" y2="0"/>
      <line x1="165"  y1="0" x2="38"  y2="0"/>
      <line x1="-116" y1="-116" x2="-27" y2="-27" transform="rotate(45)"/>
      <line x1="-116" y1="-116" x2="-27" y2="-27" transform="rotate(-45)"/>
      <line x1="-116" y1="-116" x2="-27" y2="-27" transform="rotate(135)"/>
      <line x1="-116" y1="-116" x2="-27" y2="-27" transform="rotate(-135)"/>
    </g>
  </g>

  <!-- Sphère centrale -->
  <circle cx="250" cy="244" r="52" fill="#1a0830" opacity="0.9"/>
  <circle cx="250" cy="244" r="48" fill="url(#sphere)" filter="url(#sphereSh)"/>
  <circle cx="250" cy="244" r="48" fill="url(#sphereGlow)"/>
  <circle cx="250" cy="244" r="48" fill="none" stroke="#ffe066" stroke-width="1.5" opacity="0.7"/>
  <circle cx="250" cy="244" r="44" fill="none" stroke="#c8920a" stroke-width="0.6" opacity="0.4"/>
  <text x="250" y="252" text-anchor="middle"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="22" font-weight="900"
    fill="url(#sbcGrad)" letter-spacing="1">SBC</text>

  <!-- Bord intérieur pièce -->
  <circle cx="250" cy="244" r="182" fill="none" stroke="#d4a017" stroke-width="2.5" opacity="0.75"/>
  <circle cx="250" cy="244" r="178" fill="none" stroke="#ffe066" stroke-width="0.8" opacity="0.35"/>

  <!-- Texte arcs -->
  <path id="at" d="M 74,244 A 176,176 0 0,1 426,244" fill="none"/>
  <text font-family="'Trebuchet MS', sans-serif" font-size="14" font-weight="700"
    fill="#f5d980" opacity="0.88" letter-spacing="5.5">
    <textPath href="#at" startOffset="50%" text-anchor="middle">SEINBU COIN</textPath>
  </text>
  <path id="ab" d="M 77,244 A 173,173 0 0,0 423,244" fill="none"/>
  <text font-family="'Trebuchet MS', sans-serif" font-size="13" font-weight="700"
    fill="#2adb6f" opacity="0.9" letter-spacing="10">
    <textPath href="#ab" startOffset="50%" text-anchor="middle">· SBC ·</textPath>
  </text>

  <!-- Losanges -->
  <g fill="#d4a017" opacity="0.72">
    <polygon points="80,244 87,237 94,244 87,251"/>
    <polygon points="406,244 413,237 420,244 413,251"/>
  </g>

  <!-- Reflet -->
  <ellipse cx="200" cy="185" rx="60" ry="32" fill="url(#coinGlow)" transform="rotate(-28,200,185)"/>

  <!-- Signature -->
  <text x="250" y="468" text-anchor="middle"
    font-family="'Trebuchet MS', sans-serif"
    font-size="10" fill="#d4a017" opacity="0.40" letter-spacing="4">
    SEINBU GROUP SA · ABIDJAN
  </text>
</svg>
